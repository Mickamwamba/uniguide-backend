name: Deploy Backend to EC2

on:
  push:
    branches:
      - master
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Execute Deployment on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Navigate to the backend directory on the server
            cd /var/www/projects/unipathfinder/backend
            
            # Pull the latest code
            git pull origin master
            
            # Upgrade docker-compose conditionally to prevent concurrent write locks
            if ! /usr/local/bin/docker-compose --version | grep -q '2.26.1'; then
              sudo rm -f /usr/local/bin/docker-compose || true
              sudo curl -sL "https://github.com/docker/compose/releases/download/v2.26.1/docker-compose-linux-$(uname -m)" -o /usr/local/bin/docker-compose
              sudo chmod +x /usr/local/bin/docker-compose
            fi

            # Rebuild the API container and run migrations safely
            cd /var/www/projects/unipathfinder/backend
            docker-compose up -d --build api
            docker-compose exec -T api python manage.py migrate
